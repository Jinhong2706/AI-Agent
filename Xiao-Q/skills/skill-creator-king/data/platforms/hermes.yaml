# Hermes 平台 Profile

platform_id: hermes
platform_name: Hermes
skill_dir: "~/.hermes/skills/"

frontmatter:
  triggers: []
  metadata.hermes: true

quality:
  skip_dimensions:
    - token_budget
    - semantic_consistency
    - readme_sync
    - changelog_today
  max_score: 81
  lightweight_max_score: 43

anti_patterns:
  exclude_ids:
    - AP-001
    - AP-002
    - AP-003
    - AP-004
    - AP-005
    - AP-006
    - AP-008
    - AP-010
    - AP-012

cross_platform_markers:
  - "metadata.hermes:"
