# WorkBuddy 平台 Profile
# 平台标识：WorkBuddy (agentskills.io 兼容)

platform_id: workbuddy
platform_name: WorkBuddy
skill_dir: "~/.workbuddy/skills/"

# 前端元数据模板（用于新建 skill 的 SKILL.md frontmatter）
frontmatter:
  triggers: []
  token_budget:
    L0_trigger: 200
    L1_core: 1100
    L2_deep: 5000
    hard_cap: 10000
  template: basic

# 质量审计维度配置
quality:
  # 适用全部 14 维度
  skip_dimensions: []
  max_score: 117
  lightweight_max_score: 79

# 反模式过滤
anti_patterns:
  # 无排除的反模式
  exclude_ids: []

# 跨平台标记
cross_platform_markers:
  - triggers:
  - token_budget:
  - template:
